<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>Create Account — PST Browser</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1f36 0%, #2d3561 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      width: 100%; max-width: 420px;
      padding: 40px 36px 32px;
    }
    .form-control { border-radius: 8px; font-size: .9rem; }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .btn-primary {
      background: #2563eb; border-color: #2563eb;
      border-radius: 8px; font-weight: 600;
      padding: 10px; font-size: .9rem;
    }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="text-center mb-4">
      <img src="/static/logo-icon.svg" alt="PST Browser" style="height:56px;width:56px;margin-bottom:8px;">
      <p class="text-muted small mb-0">Almost done, {{ name }}! Please review and agree to continue.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible py-2 small mb-3" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth_consent') }}">
      <div class="mb-3">
        <div class="form-check align-items-start d-flex gap-2">
          <input class="form-check-input mt-1 flex-shrink-0" type="checkbox" id="terms-consent" name="terms_consent" required>
          <label class="form-check-label small text-muted" for="terms-consent">
            I agree to the <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a>. <span class="text-danger">*</span>
          </label>
        </div>
      </div>
      <div class="mb-4">
        <div class="form-check align-items-start d-flex gap-2">
          <input class="form-check-input mt-1 flex-shrink-0" type="checkbox" id="sms-consent" name="sms_consent">
          <label class="form-check-label small text-muted" for="sms-consent">
            I agree to receive recurring promotional text messages from PSTBrowser. Message frequency varies. Msg &amp; data rates may apply. Reply STOP to unsubscribe.
          </label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-person-plus me-2"></i>Create account
      </button>
    </form>

    <div class="text-center mt-3" style="font-size:.75rem;color:#6b7280;">
      <a href="/privacy" class="text-muted">Privacy Policy</a> &nbsp;·&nbsp;
      <a href="/terms" class="text-muted">Terms of Service</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
