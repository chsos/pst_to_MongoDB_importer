<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>Text Alert Subscription — PSTBrowser</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .navbar { background: #1a1f36; }
    .card { border-radius: 14px; }
    .fine-print { font-size: .78rem; color: #6b7280; line-height: 1.6; }
  </style>
</head>
<body>

<nav class="navbar px-3 mb-5">
  <a class="navbar-brand d-flex align-items-center gap-2 p-0 text-decoration-none" href="/">
    <img src="/static/logo-icon.svg" alt="" style="height:34px;width:34px;">
    <span style="font-weight:700;letter-spacing:-0.5px;"><span style="color:#2563eb;">pst</span><span style="color:#fff;">browser</span></span>
  </a>
</nav>

<div class="container" style="max-width:520px">
  <div class="card shadow-sm border-0 p-4 p-md-5">

    <h4 class="fw-bold mb-1"><i class="bi bi-phone me-2 text-primary"></i>PSTBrowser Text Alert Subscription</h4>
    <p class="text-muted small mb-4">Sign up to receive text alerts from PSTBrowser.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'success' if cat == 'success' else 'danger' }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/sms-authorization">

      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" placeholder="Your full name" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Mobile Phone Number <span class="text-danger">*</span></label>
        <input type="tel" name="phone" class="form-control" placeholder="(555) 555-5555" required>
      </div>

      <div class="mb-3">
        <div class="form-check align-items-start d-flex gap-2">
          <input class="form-check-input mt-1 flex-shrink-0" type="checkbox" id="terms-consent" name="terms_consent" required>
          <label class="form-check-label small text-muted" for="terms-consent">
            I agree to the <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a>. <span class="text-danger">*</span>
          </label>
        </div>
      </div>

      <div class="mb-4">
        <div class="form-check align-items-start d-flex gap-2">
          <input class="form-check-input mt-1 flex-shrink-0" type="checkbox" id="sms-consent" name="sms_consent">
          <label class="form-check-label small text-muted" for="sms-consent">
            I agree to receive recurring promotional text messages from PSTBrowser. Message frequency varies. Msg &amp; data rates may apply. Reply STOP to unsubscribe.
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
        <i class="bi bi-check-circle me-2"></i>Yes, sign me up!
      </button>

    </form>
  </div>
  <p class="text-center text-muted small mt-3">
    Questions? <a href="mailto:support@pstbrowser.com">support@pstbrowser.com</a> &nbsp;·&nbsp; (571) 200-1551
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
