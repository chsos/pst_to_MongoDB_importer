<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>OCR Status — PST Browser</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .navbar { background: #1a1f36; }
    .navbar-brand { font-weight: 700; color: #fff !important; }
    .stat-card { border: none; border-radius: 12px; }
    .stat-icon { font-size: 1.6rem; }
    .file-table td, .file-table th { vertical-align: middle; font-size: .87rem; }
    .file-table th { font-size: .8rem; color: #6b7280; font-weight: 600; }
    .badge-searchable { background: #dcfce7; color: #166534; }
    .badge-scanned    { background: #fef9c3; color: #854d0e; }
    .badge-pending    { background: #f1f5f9; color: #475569; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg px-3 mb-4">
  <a class="navbar-brand d-flex align-items-center gap-2 p-0" href="/">
    <img src="/static/logo-icon.svg" alt="" style="height:36px;width:36px;">
    <span style="font-weight:700;letter-spacing:-0.5px;"><span style="color:#2563eb;">pst</span>browser</span>
  </a>
  <div class="ms-auto">
    <a href="/" class="btn btn-sm btn-outline-light">← Back</a>
  </div>
</nav>

<div class="container pb-5">

  <div class="d-flex align-items-center mb-4 gap-3">
    <h4 class="mb-0 fw-bold"><i class="bi bi-file-earmark-text me-2 text-primary"></i>OCR Status</h4>
    <span id="last-updated" class="text-muted small"></span>
    <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="load()">
      <i class="bi bi-arrow-clockwise me-1"></i>Refresh
    </button>
  </div>

  <!-- Summary cards -->
  <div class="row g-3 mb-4" id="summary-cards">
    <div class="col-6 col-md-3">
      <div class="card stat-card shadow-sm p-3 text-center">
        <div class="stat-icon mb-1"><i class="bi bi-file-earmark-pdf text-danger"></i></div>
        <div class="fs-3 fw-bold" id="s-total">—</div>
        <div class="text-muted small">Total PDFs</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card shadow-sm p-3 text-center">
        <div class="stat-icon mb-1"><i class="bi bi-check-circle text-success"></i></div>
        <div class="fs-3 fw-bold text-success" id="s-searchable">—</div>
        <div class="text-muted small">Searchable</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card shadow-sm p-3 text-center">
        <div class="stat-icon mb-1"><i class="bi bi-exclamation-circle text-warning"></i></div>
        <div class="fs-3 fw-bold text-warning" id="s-scanned">—</div>
        <div class="text-muted small">Image-only (scanned)</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card shadow-sm p-3 text-center">
        <div class="stat-icon mb-1"><i class="bi bi-hourglass-split text-secondary"></i></div>
        <div class="fs-3 fw-bold text-secondary" id="s-pending">—</div>
        <div class="text-muted small">Not yet indexed</div>
      </div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
    <input id="search-box" type="text" class="form-control form-control-sm" placeholder="Filter by filename…" style="max-width:280px" oninput="renderTable()">
    <select id="status-filter" class="form-select form-select-sm" style="max-width:180px" onchange="renderTable()">
      <option value="all">All statuses</option>
      <option value="searchable">Searchable</option>
      <option value="scanned">Image-only</option>
      <option value="not_indexed">Not indexed</option>
    </select>
    <span id="row-count" class="text-muted small ms-auto"></span>
  </div>

  <!-- Table -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div id="table-wrap">
        <div class="p-5 text-center text-muted">
          <div class="spinner-border spinner-border-sm me-2"></div>Loading…
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let _allPdfs = [];

function statusBadge(s) {
  if (s === 'searchable') return '<span class="badge badge-searchable"><i class="bi bi-check-circle me-1"></i>Searchable</span>';
  if (s === 'scanned')    return '<span class="badge badge-scanned"><i class="bi bi-image me-1"></i>Image-only</span>';
  return '<span class="badge badge-pending"><i class="bi bi-hourglass me-1"></i>Not indexed</span>';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderTable() {
  const q   = document.getElementById('search-box').value.toLowerCase();
  const sf  = document.getElementById('status-filter').value;
  const rows = _allPdfs.filter(p =>
    (sf === 'all' || p.status === sf) &&
    (!q || p.filename.toLowerCase().includes(q))
  );
  document.getElementById('row-count').textContent =
    rows.length.toLocaleString() + ' file' + (rows.length !== 1 ? 's' : '');

  if (rows.length === 0) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="p-5 text-center text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i>No files match.</div>';
    return;
  }

  const tbody = rows.map(p => `
    <tr>
      <td class="px-3"><i class="bi bi-file-earmark-pdf text-danger me-1"></i>${esc(p.filename)}</td>
      <td class="text-muted">${esc(p.size_str)}</td>
      <td>${statusBadge(p.status)}</td>
      <td class="text-muted">${p.char_count != null ? p.char_count.toLocaleString() + ' chars' : '—'}</td>
    </tr>`).join('');

  document.getElementById('table-wrap').innerHTML = `
    <div class="table-responsive">
      <table class="table table-hover file-table mb-0">
        <thead class="table-light">
          <tr>
            <th class="px-3">Filename</th>
            <th style="width:100px">Size</th>
            <th style="width:160px">Status</th>
            <th style="width:130px">Characters</th>
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

async function load() {
  try {
    const r = await fetch('/ocr-status', { credentials: 'same-origin' });
    const d = await r.json();
    _allPdfs = d.pdfs || [];
    const s  = d.summary || {};
    document.getElementById('s-total').textContent      = (s.total      || 0).toLocaleString();
    document.getElementById('s-searchable').textContent = (s.searchable || 0).toLocaleString();
    document.getElementById('s-scanned').textContent    = (s.scanned    || 0).toLocaleString();
    document.getElementById('s-pending').textContent    = (s.not_indexed|| 0).toLocaleString();
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
    renderTable();
  } catch(e) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="p-4 text-center text-danger">Failed to load: ' + esc(e.message) + '</div>';
  }
}

load();
</script>

<footer class="text-center text-muted py-4 mt-4" style="font-size:.8rem;">
  <a href="https://www.computerhelpsos.com" target="_blank" rel="noopener" class="text-muted">ComputerHelpSOS LLC</a>

</footer>
</body>
</html>
