<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password — PST Browser</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1f36 0%, #2d3561 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      width: 100%; max-width: 420px;
      padding: 40px 36px 32px;
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo i { font-size: 2.4rem; color: #2563eb; }
    .auth-logo h1 { font-size: 1.3rem; font-weight: 700; color: #111827; margin: 8px 0 2px; }
    .auth-logo p  { font-size: .82rem; color: #6b7280; margin: 0; }
    .form-control { border-radius: 8px; font-size: .9rem; }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .form-label { font-size: .85rem; font-weight: 500; color: #374151; }
    .btn-primary {
      background: #2563eb; border-color: #2563eb;
      border-radius: 8px; font-weight: 600;
      padding: 10px; font-size: .9rem;
    }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: .83rem; color: #6b7280; }
    .auth-footer a { color: #2563eb; text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <i class="bi bi-key-fill"></i>
      <h1>Forgot your password?</h1>
      <p>Enter your email and we'll send a reset link</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible py-2 small mb-3" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('forgot_password') }}">
      <div class="mb-4">
        <label class="form-label" for="email">Email address</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="you@example.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-send me-2"></i>Send reset link
      </button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('login_page') }}"><i class="bi bi-arrow-left me-1"></i>Back to sign in</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
