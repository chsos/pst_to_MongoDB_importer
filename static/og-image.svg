<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1f36"/>
      <stop offset="60%"  stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo icon (envelope + magnifying glass) — centred left -->
  <g transform="translate(100, 175) scale(1.5)">
    <!-- Envelope body -->
    <rect x="52" y="88" width="196" height="144" rx="10" fill="#1e3a5f" stroke="#60a5fa" stroke-width="3"/>
    <!-- Envelope flap -->
    <polyline points="52,88 150,163 248,88" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linejoin="round"/>
    <!-- fold lines -->
    <line x1="52"  y1="232" x2="118" y2="170" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
    <line x1="248" y1="232" x2="182" y2="170" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
    <!-- Doc -->
    <rect x="170" y="148" width="64" height="80" rx="6" fill="#1e2d3d" stroke="#60a5fa" stroke-width="2.5"/>
    <polyline points="214,148 234,148 234,168" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <line x1="180" y1="182" x2="224" y2="182" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <line x1="180" y1="193" x2="224" y2="193" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <line x1="180" y1="204" x2="210" y2="204" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <!-- Paperclip -->
    <g fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M148,108 C148,92 170,92 170,108 L170,200 C170,224 128,224 128,200 L128,116"/>
      <path d="M148,120 C148,110 160,110 160,120 L160,198 C160,212 138,212 138,198 L138,116 C138,96 158,96 158,114"/>
    </g>
    <!-- Magnifying glass -->
    <circle cx="236" cy="205" r="40" fill="#1e3a5f" stroke="#60a5fa" stroke-width="4"/>
    <line x1="222" y1="196" x2="250" y2="196" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="222" y1="206" x2="250" y2="206" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="222" y1="216" x2="242" y2="216" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="265" y1="234" x2="289" y2="258" stroke="#3b82f6" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="560" y="255" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="96" letter-spacing="-2" text-anchor="middle">
    <tspan fill="#2563eb">pst</tspan><tspan fill="#ffffff">browser</tspan>
  </text>

  <!-- Tagline -->
  <text x="560" y="320" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="28" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">
    PST Attachment Extractor &amp; Email Archive Search
  </text>

  <!-- Feature pills -->
  <g font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="500">
    <!-- Pill 1 -->
    <rect x="160" y="390" width="210" height="44" rx="22" fill="#2563eb" opacity="0.2"/>
    <rect x="160" y="390" width="210" height="44" rx="22" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    <text x="265" y="418" fill="#93c5fd" text-anchor="middle">🔍 Full-text search</text>
    <!-- Pill 2 -->
    <rect x="395" y="390" width="230" height="44" rx="22" fill="#2563eb" opacity="0.2"/>
    <rect x="395" y="390" width="230" height="44" rx="22" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    <text x="510" y="418" fill="#93c5fd" text-anchor="middle">📎 Extract attachments</text>
    <!-- Pill 3 -->
    <rect x="650" y="390" width="210" height="44" rx="22" fill="#2563eb" opacity="0.2"/>
    <rect x="650" y="390" width="210" height="44" rx="22" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    <text x="755" y="418" fill="#93c5fd" text-anchor="middle">📤 Export to CSV/ZIP</text>
    <!-- Pill 4 -->
    <rect x="885" y="390" width="185" height="44" rx="22" fill="#2563eb" opacity="0.2"/>
    <rect x="885" y="390" width="185" height="44" rx="22" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    <text x="977" y="418" fill="#93c5fd" text-anchor="middle">☁️ No install needed</text>
  </g>

  <!-- URL -->
  <text x="600" y="560" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#475569" text-anchor="middle" letter-spacing="1">
    pstbrowser.com
  </text>
</svg>
