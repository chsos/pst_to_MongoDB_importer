<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="7" fill="#2563eb"/>
  <!-- Envelope body -->
  <rect x="4" y="9" width="18" height="13" rx="1.5" fill="#fff" opacity="0.95"/>
  <!-- Envelope flap -->
  <polyline points="4,9 13,16 22,9" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Paperclip (amber) -->
  <path d="M16,8 C16,5 19.5,5 19.5,8 L19.5,17 C19.5,20 14.5,20 14.5,17 L14.5,9" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Magnifying glass circle -->
  <circle cx="24" cy="23" r="5" fill="#1d4ed8" stroke="#fff" stroke-width="1.5"/>
  <!-- Handle -->
  <line x1="28" y1="27" x2="31" y2="30" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Search lines inside glass -->
  <line x1="21.5" y1="22" x2="26.5" y2="22" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="21.5" y1="24.5" x2="25.5" y2="24.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
</svg>
